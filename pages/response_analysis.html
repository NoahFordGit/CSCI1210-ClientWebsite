<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
	<meta name='author' content='Noah Ford, Vanay Rowell, Alyssa Carlomusto, Marco Crea, Hannah Hollick'>
	<meta name='description' content='Project BucStats for CSCI-1210'>
	<meta name='date' content='4/18/2026'>
    <meta name='last revised' content='4/27/2026'>
    
    <title>BucStats | Student Analysis</title>
    <link rel="stylesheet" href="../css/response_analysis.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="../images/icon.png">
</head>

<body>
    <header class="top-header">
        <h2 class="header-logo">BUCSTATS</h2>
    </header>
    <div class="main-body">
        <aside class="sidebar">
            <div class="sidebar-content">
                <p class="nav-category">Main Menu</p>
                <nav class="side-nav">
                     <a href="index.html" class="nav-link">
                        <div class="nav-item">
                            <i class="fa-solid fa-cloud-arrow-up"></i> Landing / Upload
                        </div>
                    </a>
                    <a href="dashboard.html" class="nav-link">
                        <div class="nav-item">
                            <i class="fa-solid fa-gauge"></i> Databoard
                        </div>
                    </a>
                    <a href="response_analysis.html" class="nav-link">
                        <div class="nav-item active"> <i class="fa-solid fa-chart-area"></i> Response Analysis
                        </div>
                    </a>
                    <a href="trends.html" class="nav-link">
                        <div class="nav-item">
                            <i class="fa-solid fa-arrow-trend-up"></i>Trends Over Time
                        </div>
                    </a>
                </nav>
            </div>
        </aside>
        <main class="main-content">
            <div class="action-bar">
                <div class="title-group">
                    <h1 class="page-title">Response Analysis</h1>
                    <p class="page-subtitle">Deep dive into student feedback.</p>
                </div>
                
                <div class="action-controls">
                    <input type="text" class="search-input" placeholder="Search feedback...">
                    <button class="btn-primary"><i class="fa-solid fa-download"></i> Export</button>
                </div>
            </div>
            <div class="content-grid single-col">
                <div class="content-card">
                    <h3>What students learned</h3>
                    <div class="tag-cloud">
                        <div class="placeholder-box">Feed of text-based responses</div>
                    </div>
                    <div class="card-actions">
                        <button class="btn-show-more">Show More</button>
                    </div>
                </div>
                <div class="content-card">
                    <h3>Questions about Material</h3>
                    <div class="placeholder-box">Feed of text-based responses</div>
                    <div class="card-actions">
                        <button class="btn-show-more">Show More</button>
                    </div>
                </div>
                <div class="content-card">
                    <h3>Future Questions</h3>
                    <div class="placeholder-box">Feed of text-based responses</div>
                    <div class="card-actions">
                        <button class="btn-show-more">Show More</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src='/js/w3c.js'></script>
</body>

</html>
