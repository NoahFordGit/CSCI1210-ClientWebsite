<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BucStats | Student Analysis</title>
    <link rel="stylesheet" href="/CSCI1210-ClientWebsite-main/css/response-analysis.css">
</head>
<body>
    <header class="top-header">
        <h2 class="header-logo">BUCSTATS</h2>
    </header>

    <div class="main-body">
        <aside class="sidebar">
            <div class="sidebar-content">
                <p class="nav-category">Main Menu</p>
                <nav class="side-nav">
                     <a href="upload.html" class="nav-link">
                        <div class="nav-item">
                            <i class="fa-solid fa-cloud-arrow-up"></i> Landing / Upload
                        </div>
                    </a>
                    <a href="index.html" class="nav-link">
                        <div class="nav-item">
                            <i class="fa-solid fa-house"></i> Data Dashboard
                        </div>
                    </a>
                    <a href="response_analysis.html" class="nav-link">
                        <div class="nav-item active"> <i class="fa-solid fa-chart-line"></i> Response Analysis
                        </div>
                    </a>
                    <a href="trends.html" class="nav-link">
                        <div class="nav-item">
                            <i class="fa-solid fa-house"></i>Trends Over Time
                        </div>
                    </a>
                </nav>
            </div>
        </aside>

        <main class="main-content">
            <div class="action-bar">
                <div class="title-group">
                    <h1 class="page-title">Response Analysis</h1>
                    <p class="page-subtitle">Deep dive into student feedback.</p>
                </div>
                <div class="action-controls">
                    <input type="text" class="search-input" placeholder="Search feedback...">
                </div>
            </div>

            <div class="content-grid single-col">
                <div class="content-card">
                    <h3>What students learned</h3>
                    <div class="tag-cloud">
                        <div class="placeholder-box">Feed of text-based responses</div>
                    </div>
                    <div class="card-actions">
                        <button class="btn-show-more">Show More</button>
                    </div>
                </div>
                <div class="content-card">
                    <h3>Questions about Material</h3>
                    <div class="placeholder-box">Feed of text-based responses</div>
                    <div class="card-actions">
                        <button class="btn-show-more">Show More</button>
                    </div>
                </div>
                <div class="content-card">
                    <h3>Future Questions</h3>
                    <div class="placeholder-box">Feed of text-based responses</div>
                    <div class="card-actions">
                        <button class="btn-show-more">Show More</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
